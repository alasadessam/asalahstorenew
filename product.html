<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المنتج | أصالة</title>

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="header-top">
            <div class="container">
                🚚 شحن مجاني للطلبات فوق 500 ريال | 🎁 خصم 20% على أول طلب باستخدام كود: WELCOME20
            </div>
        </div>

        <div class="container">
            <div class="header-main">
                <a href="index.html" class="logo">
                    <i class="fas fa-crown"></i> أصالة
                </a>

                <div class="search-bar">
                    <input type="text" placeholder="ابحث عن منتجاتك المفضلة...">
                    <button><i class="fas fa-search"></i></button>
                </div>

                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleCart()">
                        <i class="fas fa-shopping-bag"></i>
                        <span class="badge" id="cartCount">0</span>
                    </button>

                    <button class="icon-btn" onclick="toggleDarkMode()">
                        <i class="fas fa-moon"></i>
                    </button>

                    <a href="login.html" class="icon-btn">
                        <i class="fas fa-user"></i>
                    </a>
                </div>
            </div>
        </div>

        <nav>
            <div class="container">
                <ul class="nav-menu">
                    <li><a href="index.html">الرئيسية</a></li>
                    <li><a href="index.html#products">منتجاتنا</a></li>
                    <li><a href="about.html">من نحن</a></li>
                    <li><a href="login.html">تسجيل الدخول</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- Product Page -->
    <section class="product-page">
        <div class="container" id="productContainer">
            <!-- يتم إدخال بيانات المنتج عبر JS -->
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>جميع الحقوق محفوظة © 2024 أصالة</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get("id"));
        const product = products.find(p => p.id === productId);
        const container = document.getElementById("productContainer");

        if (!product) {
            container.innerHTML = "<h2>المنتج غير موجود</h2>";
        } else {
            container.innerHTML = `
                <div class="modal-body" style="grid-template-columns: 1fr 1fr; padding: 40px;">
                    <div class="modal-img">${product.image}</div>

                    <div class="modal-info">
                        <span class="product-category">${getCategoryName(product.category)}</span>
                        <h2>${product.name}</h2>

                        <div class="modal-price">${product.price} ريال</div>

                        <div class="rating" style="margin-bottom: 20px;">
                            ${Array(product.rating).fill('<i class="fas fa-star"></i>').join('')}
                            ${Array(5 - product.rating).fill('<i class="far fa-star"></i>').join('')}
                        </div>

                        <p class="modal-description">${product.description}</p>

                        <div class="size-options">
                            <h4>الكمية:</h4>
                            <div class="quantity-control" style="justify-content: flex-start;">
                                <button class="qty-btn" onclick="this.nextElementSibling.textContent--">-</button>
                                <span>1</span>
                                <button class="qty-btn" onclick="this.previousElementSibling.textContent++">+</button>
                            </div>
                        </div>

                        <button class="add-to-cart" onclick="addToCart(${product.id})">
                            <i class="fas fa-shopping-bag"></i> أضف إلى السلة
                        </button>
                    </div>
                </div>
            `;
        }
    </script>

</body>
</html>
